<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咕宝网站聚合指南</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">🦉 咕宝网站聚合指南<span class="logo-en">Gubao Links</span></div>
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索网站名称或关键词...">
      </div>
      <nav class="nav-links">
        <button class="theme-toggle" id="themeToggle" title="切换暗色模式">🌙</button>
        <a href="about.html">关于</a>
      </nav>
    </header>

    <div class="tabs" id="tabs"></div>

    <!-- 加载骨架 -->
    <div class="loading-skeleton" id="loadingSkeleton">
      <div class="skeleton-tabs">
        <div class="sk-tab"></div><div class="sk-tab"></div><div class="sk-tab"></div><div class="sk-tab"></div><div class="sk-tab"></div><div class="sk-tab"></div><div class="sk-tab"></div>
      </div>
      <div class="skeleton-cards">
        <div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div>
      </div>
    </div>

    <div class="links-section" id="linksSection" style="display:none;">
      <div class="section-title" id="sectionTitle"></div>
      <div class="link-list" id="linkList"></div>
    </div>

    <footer class="footer">
      <p class="footer-stats" id="footerStats"></p>
      <p class="footer-disclaimer">免责声明：本站仅收录网站链接，不存储任何内容。链接来源均为公开资源，如有侵权请联系删除。</p>
      <p class="footer-bottom"><span>📧 联系方式：gubaby@proton.me</span><span class="footer-sep"> · </span><span>更多网站持续收录中...</span></p>
    </footer>
  </div>

  <button class="back-to-top" id="backToTop" title="回到顶部">↑</button>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
