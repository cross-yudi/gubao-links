<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咕宝网站聚合指南</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 直接调 REST API，无需外部库 -->
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">🦉 咕宝网站聚合指南<span class="logo-en">Gubao Links</span></div>
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索网站名称或关键词...">
      </div>
    </header>

    <div class="tabs" id="tabs"></div>

    <div class="links-section" id="linksSection">
      <div class="section-title" id="sectionTitle"></div>
      <div class="link-list" id="linkList"></div>
    </div>

    <footer class="footer">
      <p class="footer-disclaimer">免责声明：本站仅收录网站链接，不存储任何内容。链接来源均为公开资源，如有侵权请联系删除。</p>
      <p class="footer-bottom"><span>📧 联系方式：gubaby@proton.me</span><span class="footer-sep"> · </span><span>更多网站持续收录中...</span></p>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
